name: practica
services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - ./src:/app
    ports:
      - 8080:8080
    depends_on:
      - database
  database:
    image: mariadb:lts-ubi
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: password
    ports:
      - 3306:3306
